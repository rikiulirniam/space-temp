name: Node.js CI/CD to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Langkah baru: Install cloudflared di runner GitHub untuk menembus terowongan
      - name: Install Cloudflare Client on Runner
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy to Ubuntu via Cloudflare Tunnel SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh-deploy.domainanda.com # Gunakan subdomain baru khusus SSH
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          # Perintah sakti untuk membungkus koneksi SSH lewat Cloudflare Client:
          proxy_command: cloudflared access ssh --hostname ssh-deploy.domainanda.com
          script: |
            cd /var/www/html/tempdetection
            git pull origin main
            npm install --production
            chmod 664 monitoring.db
            pm2 restart temp-detection-api