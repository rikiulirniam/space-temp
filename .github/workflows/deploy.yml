name: Node.js CI/CD via Cloudflare Tunnel SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Cloudflare Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH Configuration
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          cat <<EOF > ~/.ssh/config
          Host ssh-deploy.rikiulir.site
              IdentityFile ~/.ssh/id_ed25519
              ProxyCommand cloudflared access ssh --hostname %h
              StrictHostKeyChecking no
          EOF

      - name: Disable IPv6 on GitHub Runner
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Execute Remote Deployment Commands
        run: |
          ssh ${{ secrets.SERVER_USER }}@ssh-deploy.rikiulir.site << 'EOF'
            cd /var/www/html/tempdetection
            git pull origin main
            npm install --production
            
            # source venv/bin/activate
            # pip install -r requirements.txt
            # deactivate
            
            chmod 664 monitoring.db
            
            # Revisi penanganan error PM2
            pm2 restart temp-detection-api || pm2 start index.js --name temp-detection-api
            pm2 restart ml-engine || pm2 start main.py --name ml-engine --interpreter python3
          EOF