name: Node.js CI/CD via Cloudflare Tunnel SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Cloudflare Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH Configuration
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat <<EOF > ~/.ssh/config
          Host ssh-deploy.rikiulir.site
              IdentityFile ~/.ssh/id_ed25519
              ProxyCommand cloudflared access ssh --hostname %h
              StrictHostKeyChecking no
          EOF

      - name: Disable IPv6 on GitHub Runner
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Execute Remote Deployment Commands
        run: |
          ssh ${{ secrets.SERVER_USER }}@ssh-deploy.rikiulir.site << 'EOF'
            set -e
            cd /var/www/html/tempdetection
            git pull origin main

            # Install node deps only if project has package.json (keep existing node app working)
            if [ -f package.json ]; then
              npm install --production
            fi

            # Setup Python virtualenv and install requirements
            if [ -f requirements.txt ]; then
              if [ ! -d venv ]; then
                python3 -m venv venv
              fi
              # Use pip from the venv to install deps
              venv/bin/pip install --upgrade pip
              venv/bin/pip install -r requirements.txt
            fi

            # Ensure DB permissions
            if [ -f monitoring.db ]; then
              chmod 664 monitoring.db || true
            fi

            # PM2: restart or start services. Use venv python for the Python process.
            pm2 restart temp-detection-api || pm2 start index.js --name temp-detection-api
            pm2 restart ml-engine || pm2 start main.py --name ml-engine --interpreter $(pwd)/venv/bin/python
          EOF
